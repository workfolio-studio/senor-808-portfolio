<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" fill="none">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <style>
    .fav-bg { fill: #0B0F14; }
    .ring-white { stroke: #ffffff; stroke-width: 6; }
    .ring-accent { stroke: #D81B60; stroke-width: 6.5; }
    .fav-slash { stroke: #D81B60; stroke-width: 4.5; stroke-linecap: round; filter: url(#glow); }
    .fav-slash-white { stroke: #ffffff; stroke-width: 4.5; stroke-linecap: round; }
  </style>

  <!-- Deep dark rounded background to stand out on any tab bar (light or dark mode) -->
  <rect width="128" height="128" rx="28" class="fav-bg" />

  <!-- Integrated "808" vector shape -->
  <g transform="translate(64, 64)">
    <!-- Left Ring "8" -->
    <g transform="translate(-24, 0)">
      <circle cx="0" cy="-11" r="10.5" class="ring-white" />
      <circle cx="0" cy="11" r="13" class="ring-white" />
    </g>

    <!-- Right Ring "8" -->
    <g transform="translate(24, 0)">
      <circle cx="0" cy="-11" r="10.5" class="ring-white" />
      <circle cx="0" cy="11" r="13" class="ring-white" />
    </g>

    <!-- Center Ring "0" -->
    <ellipse cx="0" cy="0" rx="9" ry="18" class="ring-accent" />

    <!-- Sharp slash mark -->
    <line x1="-34" y1="28" x2="34" y2="-28" class="fav-slash-white" />
    <line x1="-28" y1="22" x2="28" y2="-22" class="fav-slash" />
  </g>
</svg>
