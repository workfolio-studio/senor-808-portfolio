<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow" />
    <title>Inquiry Sent | Señor 808</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0B0F14;
        --panel: #111C2E;
        --text: #F5F7FA;
        --muted: #C7CED9;
        --border: #273142;
        --accent: #D81B60;
      }
      * { box-sizing: border-box; }
      body {
        min-height: 100svh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
        background:
          radial-gradient(circle at 50% 0%, rgba(216, 27, 96, .18), transparent 34%),
          var(--bg);
        color: var(--text);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      main {
        width: min(720px, 100%);
        padding: clamp(32px, 6vw, 64px);
        border: 1px solid var(--border);
        border-radius: 28px;
        background: rgba(17, 28, 46, .82);
        box-shadow: 0 30px 90px rgba(0,0,0,.45);
        text-align: center;
      }
      img { width: 150px; margin: 0 auto 34px; }
      h1 { margin: 0; font-size: clamp(2.2rem, 6vw, 4rem); line-height: 1.05; }
      p { margin: 20px auto 0; max-width: 560px; color: var(--muted); line-height: 1.7; font-size: 1.05rem; }
      a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 48px;
        margin-top: 32px;
        padding: 0 22px;
        border: 1px solid var(--accent);
        border-radius: 999px;
        background: var(--accent);
        color: #fff;
        font-weight: 800;
        text-decoration: none;
      }
      a:focus-visible { outline: 2px solid #FF4F93; outline-offset: 4px; }
    </style>
  </head>
  <body>
    <main>
      <img src="./assets/logos/Senor808_Wordmark_Primary_White.svg" alt="Señor 808" />
      <h1>Your inquiry was sent.</h1>
      <p>Thank you for reaching out. Bob Garcia will review the project details and respond from the Señor 808 studio inbox when the opportunity aligns with current availability.</p>
      <a href="./#home">Return to the website</a>
    </main>
  </body>
</html>
